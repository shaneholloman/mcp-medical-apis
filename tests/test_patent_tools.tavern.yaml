---
test_name: Patent API Tools Test Suite

marks:
  - tavern
  - usefixtures:
      - server_process

stages:
  - name: Search Orange Book patent signals by active ingredient
    request:
      url: "http://localhost:8000/tools/patent/mcp"
      method: POST
      headers:
        Content-Type: "application/json"
        Accept: "application/json, text/event-stream"
      json:
        jsonrpc: "2.0"
        id: 1
        method: "tools/call"
        params:
          name: "patent_search_orange_book"
          arguments:
            active_ingredient: "losartan"
            limit: 3
    response:
      status_code: 200
      strict:
        - json:off
      save:
        $ext:
          function: tests.tavern_utils:parse_and_validate_mcp_json
          extra_kwargs:
            expected_api_source: "FDA_drugsfda"
      verify_response_with:
        - function: tests.tavern_utils:validate_saved_json
          extra_kwargs:
            variable_name: "parsed_json"
            expected_body:
              api_source: "FDA_drugsfda"
              data:
                type: list
                min_length: 1
              metadata:
                type: dict
                required:
                  - total
                  - query
                  - suggested_next_steps
      json:
        jsonrpc: "2.0"
        id: 1
        result:
          content:
            - type: "text"
          isError: false

  - name: Search Orange Book patent signals through unified MCP
    request:
      url: "http://localhost:8000/tools/unified/mcp"
      method: POST
      headers:
        Content-Type: "application/json"
        Accept: "application/json, text/event-stream"
      json:
        jsonrpc: "2.0"
        id: 2
        method: "tools/call"
        params:
          name: "patent_search_orange_book"
          arguments:
            active_ingredient: "losartan"
            limit: 2
    response:
      status_code: 200
      strict:
        - json:off
      save:
        $ext:
          function: tests.tavern_utils:parse_and_validate_mcp_json
          extra_kwargs:
            expected_api_source: "FDA_drugsfda"
      verify_response_with:
        - function: tests.tavern_utils:validate_saved_json
          extra_kwargs:
            variable_name: "parsed_json"
            expected_body:
              api_source: "FDA_drugsfda"
              data:
                type: list
                min_length: 1
              metadata:
                type: dict
                required:
                  - total
                  - query
      json:
        jsonrpc: "2.0"
        id: 2
        result:
          content:
            - type: "text"
          isError: false

  - name: Get exclusivity signals by active ingredient
    request:
      url: "http://localhost:8000/tools/patent/mcp"
      method: POST
      headers:
        Content-Type: "application/json"
        Accept: "application/json, text/event-stream"
      json:
        jsonrpc: "2.0"
        id: 3
        method: "tools/call"
        params:
          name: "patent_get_exclusivities"
          arguments:
            active_ingredient: "losartan"
    response:
      status_code: 200
      strict:
        - json:off
      save:
        $ext:
          function: tests.tavern_utils:parse_and_validate_mcp_json
          extra_kwargs:
            expected_api_source: "FDA_drugsfda"
      verify_response_with:
        - function: tests.tavern_utils:validate_saved_json
          extra_kwargs:
            variable_name: "parsed_json"
            expected_body:
              api_source: "FDA_drugsfda"
              data:
                type: list
              metadata:
                type: dict
                required:
                  - total
                  - query
                  - suggested_next_steps
      json:
        jsonrpc: "2.0"
        id: 3
        result:
          content:
            - type: "text"
          isError: false

  - name: Patent exclusivities request without required arguments returns validation error payload
    request:
      url: "http://localhost:8000/tools/patent/mcp"
      method: POST
      headers:
        Content-Type: "application/json"
        Accept: "application/json, text/event-stream"
      json:
        jsonrpc: "2.0"
        id: 4
        method: "tools/call"
        params:
          name: "patent_get_exclusivities"
          arguments: {}
    response:
      status_code: 200
      strict:
        - json:off
      save:
        $ext:
          function: tests.tavern_utils:parse_and_validate_mcp_json
          extra_kwargs:
            expected_api_source: "FDA_drugsfda"
      verify_response_with:
        - function: tests.tavern_utils:validate_saved_json
          extra_kwargs:
            variable_name: "parsed_json"
            expected_body:
              api_source: "FDA_drugsfda"
              data:
                type: list
              metadata:
                type: dict
                required:
                  - error
      json:
        jsonrpc: "2.0"
        id: 4
        result:
          content:
            - type: "text"
          isError: false
